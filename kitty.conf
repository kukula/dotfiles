# kitty.conf — trimmed to active settings only.
# Run `kitty +runtime-dir` / see `man kitty.conf` for the full reference.
# vim:fileencoding=utf-8:foldmethod=marker

# Font
font_family  monaco
font_size    13.0

# Behaviour
mouse_hide_wait        0
strip_trailing_spaces  always
enable_audio_bell      no
term                   xterm-256color
kitty_mod              ctrl+shift

# Window
window_margin_width      2
window_padding_width     8 12
hide_window_decorations  titlebar-only

# Tab bar
tab_bar_style        powerline
tab_powerline_style  round

# --- TokyoNight (night) ---------------------------------------------------
background            #1a1b26
foreground            #c0caf5
selection_background  #33467c
selection_foreground  #c0caf5
url_color             #73daca
cursor                #c0caf5
cursor_text_color     #1a1b26

active_border_color    #7aa2f7
inactive_border_color  #292e42

active_tab_background    #7aa2f7
active_tab_foreground    #16161e
inactive_tab_background  #292e42
inactive_tab_foreground  #545c7e

# normal
color0  #15161e
color1  #f7768e
color2  #9ece6a
color3  #e0af68
color4  #7aa2f7
color5  #bb9af7
color6  #7dcfff
color7  #a9b1d6

# bright
color8   #414868
color9   #f7768e
color10  #9ece6a
color11  #e0af68
color12  #7aa2f7
color13  #bb9af7
color14  #7dcfff
color15  #c0caf5

# extended
color16  #ff9e64
color17  #db4b4b
